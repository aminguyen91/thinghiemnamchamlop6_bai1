<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Tương tác Nam châm Chuẩn Xác</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #eef2f3;
            --panel-bg: #ffffff;
            --north-color: #e74c3c; /* Đỏ - Cực N */
            --south-color: #3498db; /* Xanh - Cực S */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 800px;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 22px;
        }

        /* Khung mô phỏng thí nghiệm */
        #canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(to bottom, #e0f2fe, #ffffff);
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Giá treo giá đỡ */
        .stand {
            position: absolute;
            top: 0;
            left: 45%;
            width: 80px;
            height: 10px;
            background-color: #334155;
        }
        .stand::after {
            content: '';
            position: absolute;
            top: 0;
            left: 38px;
            width: 4px;
            height: 140px;
            background-color: #64748b;
        }

        /* Hệ thống trục xoay cho Nam châm 1 (Treo) */
        #magnet-suspended-holder {
            position: absolute;
            top: 140px; /* Điểm cuối của sợi dây treo */
            left: calc(45% + 40px);
            width: 0;
            height: 0;
            transform: rotate(0deg);
            transition: transform 0.05s linear;
        }

        #magnet-suspended {
            position: absolute;
            top: -15px; /* Căn giữa thanh theo trục dọc */
            left: -80px; /* Đặt tâm xoay chính xác ở giữa thanh nam châm (khuyên treo) */
            width: 160px;
            height: 30px;
            display: flex;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Nam châm di chuyển (Nam châm 2) */
        #magnet-moving {
            position: absolute;
            top: 185px;
            left: 580px;
            width: 160px;
            height: 30px;
            display: flex;
            transform: rotate(-15deg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: left 0.05s linear, transform 0.05s linear;
        }

        /* Cực nam châm */
        .pole {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            user-select: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .pole.n { background-color: var(--north-color); border-radius: 4px 0 0 4px; }
        .pole.s { background-color: var(--south-color); border-radius: 0 4px 4px 0; }

        /* Khung hiển thị trạng thái / Lời hướng dẫn */
        #status-box {
            background-color: #f8fafc;
            border-left: 5px solid #3b82f6;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 500;
            min-height: 24px;
            text-align: left;
        }

        /* Bảng nút điều khiển */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        button#btn-reset { background-color: #ef4444; }
        button#btn-reset:hover { background-color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h2>MÔ PHỎNG TƯƠNG TÁC GIỮA HAI NAM CHÂM (BÀI HỌC VẬT LÝ)</h2>
    
    <div id="canvas-container">
        <div class="stand"></div>
        
        <div id="magnet-suspended-holder">
            <div id="magnet-suspended">
                <div class="pole n">N</div>
                <div class="pole s">S</div>
            </div>
        </div>

        <div id="magnet-moving">
            <div class="pole n">N</div>
            <div class="pole s">S</div>
        </div>
    </div>

    <div id="status-box">Nhấn <b>"Bắt đầu"</b> để tiến hành chuỗi thí nghiệm tương tác.</div>

    <div class="controls">
        <button id="btn-start">🟢 Bắt đầu</button>
        <button id="btn-pause" disabled>⏸️ Tạm dừng</button>
        <button id="btn-step">⏭️ Xem từng bước</button>
        <button id="btn-reset">🔄 Làm lại</button>
    </div>
</div>

<script>
    const holder = document.getElementById('magnet-suspended-holder');
    const magMoving = document.getElementById('magnet-moving');
    const statusBox = document.getElementById('status-box');
    
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnStep = document.getElementById('btn-step');
    const btnReset = document.getElementById('btn-reset');

    let animationId = null;
    let isPlaying = false;
    let currentStep = 1; // Bước 1: Khác cực (Hút), Bước 2: Cùng cực (Đẩy)
    
    // Tọa độ khởi tạo mặc định
    let moveX = 580;
    let moveRot = -15;
    let suspRot = 0;
    const speed = 2.5;

    function playSound(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'click') {
            osc.frequency.setValueAtTime(120, ctx.currentTime);
            gain.gain.setValueAtTime(0.4, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
            osc.start(); osc.stop(ctx.currentTime + 0.08);
        } else if (type === 'step') {
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
    }

    function updatePositions() {
        magMoving.style.left = `${moveX}px`;
        magMoving.style.transform = `rotate(${moveRot}deg)`;
        holder.style.transform = `rotate(${suspRot}deg)`;
    }

    function simulationLoop() {
        if (!isPlaying) return;

        if (currentStep === 1) { 
            // THÍ NGHIỆM 1: HAI CỰC KHÁC TÊN (S gặp N) -> HÚT NHAU DÍNH CHẶT
            if (moveX > 328) { // Khoảng cách tới điểm va chạm lý tưởng
                moveX -= speed;
                if (moveX < 460) {
                    suspRot += 0.42; // Nam châm treo từ từ bị hút nghiêng đầu xuống sát
                }
            } else {
                // Điểm dính khít hình học chuẩn tuyệt đối không bị hở lệch
                moveX = 328;
                suspRot = 21;
                moveRot = -15;
                updatePositions();
                playSound('click');
                statusBox.innerHTML = "✨ <b>Kết luận Bước 1:</b> Khi đưa hai đầu cực <b>KHÁC TÊN</b> lại gần nhau (Cực S màu xanh và Cực N màu đỏ), chúng tạo ra lực từ hút mạnh và <b>HÚT NHAU DÍNH SÁT KHÍT</b>.";
                endCurrentStep();
                return;
            }
        } 
        else if (currentStep === 2) { 
            // THÍ NGHIỆM 2: HAI CỰC CÙNG TÊN (N gặp N) -> ĐẨY NHAU LỆCH HẲN
            if (moveX > 390) { 
                moveX -= speed;
                if (moveX < 500) {
                    suspRot -= 0.75; // Bị đẩy mạnh ngược chiều, đuôi văng lên, đầu tránh xa cực kia
                }
            } else {
                moveX = 390;
                suspRot = -25; // Đạt độ lệch tối đa thể hiện lực đẩy mạnh
                updatePositions();
                statusBox.innerHTML = "✨ <b>Kết luận Bước 2:</b> Khi đưa hai đầu cực <b>CÙNG TÊN</b> lại gần nhau (Cực N màu đỏ và Cực N màu đỏ), chúng xuất hiện lực từ đẩy nhau và <b>ĐẨY NHAU RA XA</b>.";
                endCurrentStep();
                return;
            }
        }

        updatePositions();
        animationId = requestAnimationFrame(simulationLoop);
    }

    function startSim() {
        isPlaying = true;
        btnStart.disabled = true;
        btnPause.disabled = false;
        btnStep.disabled = true;
        playSound('step');
        
        if (currentStep === 1) {
            statusBox.innerHTML = "🔮 <i>Đang thực nghiệm:</i> Đưa cực <b>N (Đỏ)</b> lại gần cực <b>S (Xanh)</b> của nam châm treo...";
        } else {
            statusBox.innerHTML = "🔮 <i>Đang thực nghiệm:</i> Đảo đầu nam châm di chuyển, đưa cực <b>N (Đỏ)</b> lại gần cực <b>N (Đỏ)</b> của nam châm treo...";
        }
        
        simulationLoop();
    }

    function pauseSim() {
        isPlaying = false;
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnStep.disabled = false;
        btnStart.innerHTML = "▶️ Tiếp tục";
        cancelAnimationFrame(animationId);
    }

    function endCurrentStep() {
        isPlaying = false;
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnStep.disabled = false;
        
        if (currentStep === 1) {
            btnStart.innerHTML = "⏭️ Chuyển Bước 2 (Đẩy)";
        } else {
            btnStart.innerHTML = "▶️ Chạy lại từ đầu";
        }
        cancelAnimationFrame(animationId);
    }

    function resetSim() {
        pauseSim();
        currentStep = 1;
        moveX = 580;
        moveRot = -15;
        suspRot = 0;
        
        // Đặt lại nam châm di chuyển về cấu hình ban đầu (N-Đỏ hướng sang trái)
        magMoving.innerHTML = '<div class="pole n">N</div><div class="pole s">S</div>';
        statusBox.innerHTML = "Nhấn <b>\"Bắt đầu\"</b> để tiến hành chuỗi thí nghiệm tương tác.";
        btnStart.innerHTML = "🟢 Bắt đầu";
        btnStep.disabled = false;
        updatePositions();
    }

    function stepSim() {
        pauseSim();
        if (currentStep === 1) {
            // Đang ở bước 1 hoặc chuẩn bị chạy bước 2
            // Chuẩn bị cấu hình đẩy nhau: Đảo đầu nam châm dịch chuyển (để đầu N hướng sang trái, nam châm treo cũng đầu N hướng sang trái)
            // Lật ngược thanh di chuyển để đầu N đỏ gặp đầu N đỏ của thanh treo
            moveX = 580;
            moveRot = -15;
            suspRot = 0;
            // Ta lật thanh 2 thành S-N để đầu N hướng về phía nam châm treo vốn có cấu trúc N-S (N nằm bên trái)
            // Nhưng nam châm treo đầu N nằm ở Trục Trái. Do đó để 2 đầu N gặp nhau, thanh di chuyển phải đổi đầu S sang phải, N sang trái
            // Như vậy mặc định (N bên trái, S bên phải) đưa sát vào thanh treo (N bên trái, S bên phải) thì đầu N thanh di chuyển sẽ đâm vào đầu S thanh treo (Hút).
            // Để ĐẨY: Cần đầu N thanh di chuyển chạm đầu N thanh treo? Không, trong cấu trúc hình vẽ, đuôi của thanh treo là S, đầu là N. Thanh di chuyển tiến từ phải sang trái.
            // Vậy nó sẽ tiếp cận đầu S (phía bên phải) của thanh treo trước!
            // Do đó: Để Hút -> Đưa đầu N (Đỏ) tiếp cận đầu S (Xanh) của thanh treo (Mặc định).
            // Để Đẩy -> Đưa đầu S (Xanh) tiếp cận đầu S (Xanh) của thanh treo.
            magMoving.innerHTML = '<div class="pole s">S</div><div class="pole n">N</div>';
            currentStep = 2;
            statusBox.innerHTML = "📋 <b>Cấu hình Bước 2:</b> Thử nghiệm đưa hai cực cùng tên lại gần nhau (S hướng vào S).";
            startSim();
        } else {
            resetSim();
        }
    }

    // Xử lý logic nút bấm thông minh tự nhận diện bước tiếp theo
    btnStart.addEventListener('click', () => {
        if (btnStart.innerHTML.includes("Chuyển Bước 2")) {
            currentStep = 2;
            magMoving.innerHTML = '<div class="pole s">S</div><div class="pole n">N</div>';
            moveX = 580;
            moveRot = -15;
            suspRot = 0;
            updatePositions();
            startSim();
        } else if (btnStart.innerHTML.includes("Chạy lại")) {
            resetSim();
            startSim();
        } else {
            startSim();
        }
    });

    btnPause.addEventListener('click', pauseSim);
    btnReset.addEventListener('click', resetSim);
    btnStep.addEventListener('click', stepSim);

    // Render trạng thái cân bằng tĩnh lúc đầu
    updatePositions();
</script>

</body>
</html>
