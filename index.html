<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Tương tác Nam châm Chuẩn Xác Vật Lý</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #eef2f3;
            --panel-bg: #ffffff;
            --north-color: #e74c3c; /* Đỏ - Cực N */
            --south-color: #3498db; /* Xanh - Cực S */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 800px;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 22px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(to bottom, #e0f2fe, #ffffff);
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Giá đỡ và dây treo cố định */
        .stand {
            position: absolute;
            top: 0;
            left: 50%;
            width: 80px;
            height: 10px;
            background-color: #334155;
            transform: translateX(-50%);
        }
        .stand::after {
            content: '';
            position: absolute;
            top: 0;
            left: 38px;
            width: 4px;
            height: 140px;
            background-color: #64748b;
        }

        /* Tâm xoay của dây treo đặt cố định tại điểm (400, 140) */
        #magnet-suspended-holder {
            position: absolute;
            top: 140px; 
            left: 400px;
            width: 0;
            height: 0;
            transform: rotate(0deg);
            transition: transform 0.04s linear;
        }

        /* Thanh nam châm treo cân bằng tại tâm */
        #magnet-suspended {
            position: absolute;
            top: -15px; 
            left: -80px; 
            width: 160px;
            height: 30px;
            display: flex;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Nam châm di chuyển tịnh tiến cầm tay */
        #magnet-moving {
            position: absolute;
            top: 185px;
            left: 580px;
            width: 160px;
            height: 30px;
            display: flex;
            transform: rotate(-15deg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: left 0.04s linear, top 0.04s linear, transform 0.04s linear;
        }

        .pole {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            user-select: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .pole.n { background-color: var(--north-color); border-radius: 4px 0 0 4px; }
        .pole.s { background-color: var(--south-color); border-radius: 0 4px 4px 0; }

        #status-box {
            background-color: #f8fafc;
            border-left: 5px solid #3b82f6;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 500;
            min-height: 24px;
            text-align: left;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        button#btn-reset { background-color: #ef4444; }
        button#btn-reset:hover { background-color: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h2>MÔ PHỎNG TƯƠNG TÁC GIỮA HAI NAM CHÂM</h2>
    
    <div id="canvas-container">
        <div class="stand"></div>
        
        <div id="magnet-suspended-holder">
            <div id="magnet-suspended">
                <div class="pole n">N</div>
                <div class="pole s">S</div>
            </div>
        </div>

        <div id="magnet-moving">
            <div id="moving-left-pole" class="pole n">N</div>
            <div id="moving-right-pole" class="pole s">S</div>
        </div>
    </div>

    <div id="status-box">Nhấn <b>"Bắt đầu"</b> để quan sát hiện tượng.</div>

    <div class="controls">
        <button id="btn-start">🟢 Bắt đầu</button>
        <button id="btn-pause" disabled>⏸️ Tạm dừng</button>
        <button id="btn-step">⏭️ Xem từng bước</button>
        <button id="btn-reset">🔄 Làm lại</button>
    </div>
</div>

<script>
    const holder = document.getElementById('magnet-suspended-holder');
    const magMoving = document.getElementById('magnet-moving');
    const movingLeftPole = document.getElementById('moving-left-pole');
    const movingRightPole = document.getElementById('moving-right-pole');
    const statusBox = document.getElementById('status-box');
    
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnStep = document.getElementById('btn-step');
    const btnReset = document.getElementById('btn-reset');

    let animationId = null;
    let isPlaying = false;
    let currentStep = 1; // 1: Hút nhau (Khác cực), 2: Đẩy nhau (Cùng cực)
    
    // Tọa độ khởi tạo động
    let moveX = 580;
    let moveY = 185;
    let moveRot = -15;
    let suspRot = 0;
    const speed = 2.5;

    function playSound(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);

        if (type === 'click') {
            osc.frequency.setValueAtTime(140, ctx.currentTime);
            gain.gain.setValueAtTime(0.4, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
            osc.start(); osc.stop(ctx.currentTime + 0.08);
        } else if (type === 'step') {
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        }
    }

    function updatePositions() {
        magMoving.style.left = `${moveX}px`;
        magMoving.style.top = `${moveY}px`;
        magMoving.style.transform = `rotate(${moveRot}deg)`;
        holder.style.transform = `rotate(${suspRot}deg)`;
    }

    function simulationLoop() {
        if (!isPlaying) return;

        if (currentStep === 1) { 
            // BƯỚC 1: HAI CỰC KHÁC TÊN TIẾN LẠI GẦN (S xanh gặp N đỏ) -> HÚT NHAU DÍNH SÁT KHÍT
            if (moveX > 430) {
                moveX -= speed;
                moveY -= 0.3; // Di chuyển hướng chếch lên một chút theo góc nghiêng
                if (moveX < 510) {
                    suspRot += 0.45; // Đầu S (Xanh) bị hút kéo nghiêng xuống dưới
                }
            } else {
                // Toạ độ điểm chạm khít hình học lý tưởng giữa hai màu khác nhau (Xanh chạm Đỏ)
                moveX = 430;
                moveY = 167;
                moveRot = -15;
                suspRot = 15;
                updatePositions();
                playSound('click');
                statusBox.innerHTML = "✨ <b>Kết luận Bước 1:</b> Khi đưa hai cực <b>KHÁC TÊN</b> lại gần nhau (Đầu S XANH của thanh treo gặp đầu N ĐỎ của thanh di chuyển), lực từ sẽ làm chúng <b>HÚT NHAU VÀ DÍNH CHẶT KHÍT</b>.";
                endCurrentStep();
                return;
            }
        } 
        else if (currentStep === 2) { 
            // BƯỚC 2: HAI CỰC CÙNG TÊN TIẾN LẠI GẦN (S xanh gặp S xanh) -> TỰ ĐỘNG ĐẨY XOAY RA 2 BÊN
            if (moveX > 450) {
                moveX -= speed;
                if (moveX < 530) {
                    suspRot -= 0.85; // Cực cùng màu đẩy nhau khiến thanh treo xoay ngược hẳn ra xa bên trái
                }
            } else {
                moveX = 450;
                suspRot = -25; // Thanh treo bật hẳn góc âm sang trái, giữ khoảng cách đẩy nhau rõ rệt
                updatePositions();
                statusBox.innerHTML = "✨ <b>Kết luận Bước 2:</b> Khi đưa hai cực <b>CÙNG TÊN</b> lại gần nhau (Đầu S XANH gặp đầu S XANH), lực từ đẩy ngược khiến hai thanh nam châm <b>TỰ ĐẨY NHAU RA XA SANG HAI BÊN</b>.";
                endCurrentStep();
                return;
            }
        }

        updatePositions();
        animationId = requestAnimationFrame(simulationLoop);
    }

    function startSim() {
        isPlaying = true;
        btnStart.disabled = true;
        btnPause.disabled = false;
        btnStep.disabled = true;
        playSound('step');
        
        if (currentStep === 1) {
            statusBox.innerHTML = "🔮 <i>Thực nghiệm 1:</i> Đang đưa cực <b>N (Đỏ)</b> lại gần cực <b>S (Xanh)</b> của nam châm treo...";
        } else {
            statusBox.innerHTML = "🔮 <i>Thực nghiệm 2:</i> Đang đưa cực <b>S (Xanh)</b> lại gần cực <b>S (Xanh)</b> của nam châm treo...";
        }
        
        simulationLoop();
    }

    function pauseSim() {
        isPlaying = false;
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnStep.disabled = false;
        btnStart.innerHTML = "▶️ Tiếp tục";
        cancelAnimationFrame(animationId);
    }

    function endCurrentStep() {
        isPlaying = false;
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnStep.disabled = false;
        
        if (currentStep === 1) {
            btnStart.innerHTML = "⏭️ Chuyển Bước 2 (Đẩy)";
        } else {
            btnStart.innerHTML = "▶️ Chạy lại từ đầu";
        }
        cancelAnimationFrame(animationId);
    }

    function resetSim() {
        pauseSim();
        currentStep = 1;
        moveX = 580;
        moveY = 185;
        moveRot = -15;
        suspRot = 0;
        
        // Thiết lập cấu hình mặc định ban đầu cho Bước 1 (Hút): Đầu N (Đỏ) hướng về phía thanh treo
        movingLeftPole.className = "pole n"; movingLeftPole.innerHTML = "N";
        movingRightPole.className = "pole s"; movingRightPole.innerHTML = "S";
        
        statusBox.innerHTML = "Nhấn <b>\"Bắt đầu\"</b> để quan sát hiện tượng.";
        btnStart.innerHTML = "🟢 Bắt đầu";
        btnStep.disabled = false;
        updatePositions();
    }

    function stepSim() {
        pauseSim();
        if (currentStep === 1) {
            // Chuyển sang cấu hình Bước 2 (Đẩy nhau): Đảo ngược cực để đầu S (Xanh) hướng sang trái tiếp cận đầu S (Xanh) của thanh treo
            moveX = 580;
            moveY = 185;
            moveRot = -15;
            suspRot = 0;
            
            movingLeftPole.className = "pole s"; movingLeftPole.innerHTML = "S";
            movingRightPole.className = "pole n"; movingRightPole.innerHTML = "N";
            
            currentStep = 2;
            statusBox.innerHTML = "📋 <b>Cấu hình Bước 2:</b> Thử nghiệm đưa hai cực cùng tên lại gần nhau (Cực S màu Xanh gặp Cực S màu Xanh).";
            startSim();
        } else {
            resetSim();
        }
    }

    btnStart.addEventListener('click', () => {
        if (btnStart.innerHTML.includes("Chuyển Bước 2")) {
            currentStep = 2;
            movingLeftPole.className = "pole s"; movingLeftPole.innerHTML = "S";
            movingRightPole.className = "pole n"; movingRightPole.innerHTML = "N";
            moveX = 580; moveY = 185; moveRot = -15; suspRot = 0;
            updatePositions();
            startSim();
        } else if (btnStart.innerHTML.includes("Chạy lại")) {
            resetSim();
            startSim();
        } else {
            startSim();
        }
    });

    btnPause.addEventListener('click', pauseSim);
    btnReset.addEventListener('click', resetSim);
    btnStep.addEventListener('click', stepSim);

    // Khởi tạo hiển thị ban đầu khi tải trang
    resetSim();
</script>

</body>
</html>
